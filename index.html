<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Pinyin Trainer</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1a0f2e" />
<meta name="mobile-web-app-capable" content="yes" />

<!-- iOS / Safari -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Pinyin" />
<link rel="apple-touch-icon" href="icon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { overflow-x: hidden; background: linear-gradient(135deg,#0f0f1a 0%,#1a0f2e 50%,#0f1a1a 100%); min-height: 100vh; }

  @keyframes fadeIn  { from{opacity:0;transform:translateY(8px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pop {
    0%  {opacity:0;transform:translate(-50%,-50%) scale(0.5)}
    50% {opacity:1;transform:translate(-50%,-50%) scale(1.3)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
  }

  #app {
    font-family:'Noto Serif SC','STSong',serif;
    color:#e8dcc8;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 16px;
    position:relative;
    min-height:100vh;
  }

  .bg-deco {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background-image:
      radial-gradient(ellipse at 20% 20%,rgba(180,120,60,.08) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 80%,rgba(60,120,180,.08) 0%,transparent 60%);
    pointer-events:none; z-index:0;
  }

  .container { width:100%; max-width:480px; z-index:1; }

  /* Header */
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .header-label { font-size:11px; letter-spacing:3px; color:#b8a070; text-transform:uppercase; font-family:Georgia,serif; }
  .header-title { font-size:18px; color:#e8dcc8; font-family:Georgia,serif; }
  .streak-badge {
    background:rgba(180,140,60,.15); border:1px solid rgba(180,140,60,.3);
    border-radius:20px; padding:4px 14px; font-size:13px; color:#d4a840;
  }

  /* Stats */
  .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:28px; }
  .stat-card {
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
    border-radius:12px; padding:10px 8px; text-align:center; backdrop-filter:blur(10px);
  }
  .stat-value { font-size:18px; font-weight:bold; font-family:Georgia,serif; }
  .stat-label { font-size:10px; color:#8070a0; margin-top:2px; letter-spacing:1px; }

  /* Progress */
  .progress-wrap {
    height:4px; background:rgba(255,255,255,.08); border-radius:2px;
    margin-bottom:32px; overflow:hidden;
  }
  .progress-bar {
    height:100%; background:linear-gradient(90deg,#b8862a,#e8b84b);
    border-radius:2px; transition:width .4s ease;
  }

  /* Character card */
  .char-card {
    border-radius:24px; padding:36px 24px; text-align:center; cursor:pointer;
    backdrop-filter:blur(20px); transition:all .3s ease; position:relative;
    background:linear-gradient(145deg,rgba(255,255,255,.07) 0%,rgba(255,255,255,.03) 100%);
    margin-bottom:32px;
  }
  .char-card.neutral  { border:2px solid rgba(184,134,42,.3);  box-shadow:0 0 40px rgba(184,134,42,.1),  inset 0 1px 0 rgba(255,255,255,.1); }
  .char-card.correct  { border:2px solid rgba(74,222,128,.5);  box-shadow:0 0 40px rgba(74,222,128,.15), inset 0 1px 0 rgba(255,255,255,.1); }
  .char-card.wrong    { border:2px solid rgba(248,113,113,.5); box-shadow:0 0 40px rgba(248,113,113,.15),inset 0 1px 0 rgba(255,255,255,.1); }

  .speaker-hint { position:absolute; top:14px; right:16px; font-size:14px; color:rgba(180,140,60,.5); }
  .char-glyph {
    position:relative; display:flex; justify-content:center; align-items:flex-start;
    min-height:100px; margin-bottom:12px; user-select:none;
  }
  .char-main {
    font-size:96px; line-height:1;
    text-shadow:0 0 30px rgba(184,134,42,.3);
  }
  .char-trad {
    position:absolute;
    /* right edge of a 96px CJK char ≈ 50% + 48px; add 6px gap */
    left:calc(50% + 54px);
    top:10px;
    font-size:22px; line-height:1;
    color:rgba(180,140,60,.55); font-family:'Noto Serif SC','STSong',serif;
    border-left:1px solid rgba(180,140,60,.2); padding-left:8px;
  }
  .char-pinyin { font-size:22px; color:#d4a840; font-style:italic; letter-spacing:2px; font-family:Georgia,serif; margin-top:8px; animation:fadeIn .3s ease; }
  .char-meaning { font-size:13px; color:#8070a0; margin-top:6px; letter-spacing:1px; }

  .sparkle {
    position:absolute; top:50%; left:50%; font-size:48px;
    transform:translate(-50%,-50%); animation:pop .5s ease forwards; pointer-events:none;
  }

  .hint-text { text-align:center; margin-top:12px; font-size:12px; color:#6050a0; letter-spacing:2px; margin-bottom:32px; }

  /* Options */
  .options { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .option-btn {
    border-radius:14px; padding:18px 12px; font-size:20px; cursor:pointer;
    backdrop-filter:blur(10px); transition:all .25s ease; font-family:Georgia,serif;
    letter-spacing:1px; font-style:italic; display:flex; align-items:center;
    justify-content:center; gap:8px;
  }
  .option-btn.neutral {
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:#c8b890; box-shadow:none;
  }
  .option-btn.correct {
    background:rgba(74,222,128,.12); border:1px solid rgba(74,222,128,.5); color:#4ade80;
    box-shadow:0 0 20px rgba(74,222,128,.2);
  }
  .option-btn.wrong-selected {
    background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.5); color:#f87171;
    box-shadow:0 0 20px rgba(248,113,113,.2); transform:scale(.98);
  }
  .option-btn:not([disabled]):hover { filter:brightness(1.15); }

  /* Action */
  .action-row { display:flex; gap:12px; z-index:1; animation:slideUp .3s ease; }
  .next-btn {
    background:rgba(180,140,60,.15); border:1px solid rgba(180,140,60,.4);
    border-radius:12px; padding:12px 24px; color:#e8b84b; cursor:pointer;
    font-size:14px; letter-spacing:1px; font-family:Georgia,serif;
  }
  .next-btn:hover { filter:brightness(1.15); }

  /* Mode toggle */
  .mode-row {
    display:flex; gap:0; margin-bottom:14px; border-radius:12px; overflow:hidden;
    border:1px solid rgba(180,140,60,.3); background:rgba(0,0,0,.2);
  }
  .mode-btn {
    flex:1; padding:8px 0; font-size:13px; cursor:pointer;
    font-family:Georgia,serif; letter-spacing:.5px;
    background:transparent; border:none; color:rgba(220,190,120,.5);
    transition:all .2s;
  }
  .mode-btn.active { background:rgba(180,140,60,.2); color:#d4a840; font-weight:bold; }
  .pinyin-input-wrap {
    display:flex; flex-direction:column; gap:12px; align-items:center;
    padding:4px 0 20px;
  }
  .pinyin-input {
    width:100%; background:rgba(255,255,255,.06); border:1.5px solid rgba(180,140,60,.3);
    border-radius:14px; padding:16px; text-align:center;
    font-size:26px; color:#e8dcc8; font-family:Georgia,serif;
    letter-spacing:3px; outline:none; caret-color:#d4a840;
    transition:border-color .2s, color .2s;
  }
  .pinyin-input:focus { border-color:rgba(180,140,60,.7); }
  .pinyin-input.correct { border-color:rgba(74,222,128,.7); color:#4ade80; }
  .pinyin-input.wrong   { border-color:rgba(248,113,113,.7); color:#f87171; }
  .submit-btn {
    background:rgba(180,140,60,.2); border:1px solid rgba(180,140,60,.5);
    border-radius:12px; padding:12px 32px; color:#e8b84b; cursor:pointer;
    font-size:15px; letter-spacing:1px; font-family:Georgia,serif;
  }
  .submit-btn:hover { filter:brightness(1.15); }
  .submit-btn:disabled { background:rgba(180,140,60,.1); border-color:rgba(180,140,60,.2); color:rgba(232,184,75,.6); cursor:not-allowed; }

  /* Level selector */
  .level-row {
    display:flex; gap:8px; overflow-x:auto; padding:0 2px 10px;
    scrollbar-width:none; margin-bottom:8px;
  }
  .level-row::-webkit-scrollbar { display:none; }
  .level-btn {
    flex-shrink:0; padding:5px 14px; border-radius:20px; font-size:12px;
    cursor:pointer; font-family:Georgia,serif; letter-spacing:.5px;
    border:1px solid rgba(180,140,60,.25); background:rgba(180,140,60,.06);
    color:rgba(220,190,120,.6); transition:all .2s;
  }
  .level-btn:hover { background:rgba(180,140,60,.14); color:#d4a840; }
  .level-btn.active {
    background:rgba(180,140,60,.2); border-color:rgba(180,140,60,.6);
    color:#d4a840; font-weight:bold;
  }
  .level-btn:disabled { opacity:0.35; cursor:not-allowed; }
  #mistakes-btn { border-color:rgba(248,113,113,.3); color:rgba(248,113,113,.55); }
  #mistakes-btn:not(:disabled):hover { background:rgba(248,113,113,.1); color:#f87171; }
  #mistakes-btn.active { background:rgba(248,113,113,.15); border-color:rgba(248,113,113,.6); color:#f87171; }

  /* Max streak */
  .max-streak {
    position:fixed; bottom:20px; right:20px;
    background:rgba(180,140,60,.15); border:1px solid rgba(180,140,60,.3);
    border-radius:16px; padding:8px 14px; font-size:13px; color:#d4a840;
    z-index:10; backdrop-filter:blur(10px);
  }
</style>
</head>
<body>
<div id="app">
  <div class="bg-deco"></div>

  <!-- Header -->
  <div class="container">
    <div class="header">
      <div>
        <div class="header-label">拼音学习</div>
        <div class="header-title">Pinyin Trainer</div>
      </div>
      <div id="streak-badge" class="streak-badge">🔥 0 streak</div>
    </div>

    <!-- Mode toggle -->
    <div class="mode-row">
      <button class="mode-btn active" data-mode="quiz">Trắc nghiệm</button>
      <button class="mode-btn" data-mode="input">Nhập pinyin</button>
    </div>

    <!-- Level selector -->
    <div class="level-row">
      <button class="level-btn active" data-level="all">全部</button>
      <button class="level-btn" data-level="1">HSK 1</button>
      <button class="level-btn" data-level="2">HSK 2</button>
      <button class="level-btn" data-level="3">HSK 3</button>
      <button class="level-btn" data-level="4">HSK 4</button>
      <button class="level-btn" data-level="5">HSK 5</button>
      <button class="level-btn" data-level="6">HSK 6</button>
      <button class="level-btn" data-level="7">HSK 7</button>
      <button class="level-btn" id="mistakes-btn" data-level="mistakes">Đã sai (0)</button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card"><div id="stat-score"  class="stat-value" style="color:#4ade80">0</div><div class="stat-label">Đúng</div></div>
      <div class="stat-card"><div id="stat-acc"    class="stat-value" style="color:#60a5fa">0%</div><div class="stat-label">Chính xác</div></div>
      <div class="stat-card"><div id="stat-prog"   class="stat-value" style="color:#c084fc">0/0</div><div class="stat-label">Đã học</div></div>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div id="progress-bar" class="progress-bar" style="width:0%"></div>
    </div>

    <!-- Character card -->
    <div id="char-card" class="char-card neutral">
      <div class="speaker-hint">🔊</div>
      <div id="char-glyph" class="char-glyph">
        <span id="char-main" class="char-main"></span>
        <span id="char-trad" class="char-trad" style="display:none"></span>
      </div>
      <div id="char-reveal" style="display:none">
        <div id="char-pinyin" class="char-pinyin"></div>
        <div id="char-meaning" class="char-meaning"></div>
      </div>
      <div id="sparkle" class="sparkle" style="display:none">✨</div>
    </div>

    <div id="hint-text" class="hint-text">Chọn phiên âm đúng · Nhấn chữ để nghe</div>

    <!-- Options -->
    <div id="options" class="options"></div>

    <!-- Input area (input mode) -->
    <div id="input-area" style="display:none">
      <div class="pinyin-input-wrap">
        <input id="pinyin-input" class="pinyin-input" type="text"
               placeholder="Nhập pinyin..." autocomplete="off"
               autocorrect="off" autocapitalize="off" spellcheck="false" />
        <button id="submit-btn" class="submit-btn">Kiểm tra →</button>
      </div>
    </div>

    <!-- Action -->
    <div id="action-row" class="action-row" style="display:none">
      <button id="next-btn" class="next-btn">Tiếp theo →</button>
    </div>
  </div>

  <div id="max-streak-badge" class="max-streak" style="display:none">🏆 Kỷ lục: <span id="max-streak-val">0</span></div>
</div>

<script>
    const fetchSync = (url) => {
      const xhr = new XMLHttpRequest();
      xhr.open("GET", url, false); // Synchronous request
      xhr.send(null);
      if (xhr.status === 200) {
        return JSON.parse(xhr.responseText);
      } else {
        console.error("Failed to load " + url);
        return [];
      }
    };
    /* 
    [
        {  
            "char": "厂",
            "traditional": "廠",
            "pinyin": [
                "chǎng",
                "ān",
                "hàn"
            ],
            "frequency": 963,
            "definition": "factory, workshop; radical 27",
            "hsk_level": 5
        },
        ...
    ]
    */
const CHARACTERS = fetchSync("all_characters.json");

const HSK1_CHARS = CHARACTERS.filter(c => c.hsk_level === 1).map(c => c.char);
const HSK2_CHARS = CHARACTERS.filter(c => c.hsk_level === 2).map(c => c.char);
const HSK3_CHARS = CHARACTERS.filter(c => c.hsk_level === 3).map(c => c.char);
const HSK4_CHARS = CHARACTERS.filter(c => c.hsk_level === 4).map(c => c.char);
const HSK5_CHARS = CHARACTERS.filter(c => c.hsk_level === 5).map(c => c.char);
const HSK6_CHARS = CHARACTERS.filter(c => c.hsk_level === 6).map(c => c.char);
const HSK7_CHARS = CHARACTERS.filter(c => c.hsk_level === 7).map(c => c.char);

const HSK_MAP = {
  '1': new Set(HSK1_CHARS),
  '2': new Set(HSK2_CHARS),
  '3': new Set(HSK3_CHARS),
  '4': new Set(HSK4_CHARS),
  '5': new Set(HSK5_CHARS),
  '6': new Set(HSK6_CHARS),
};
const ALL_HSK_SET = new Set([...HSK1_CHARS,...HSK2_CHARS,...HSK3_CHARS,...HSK4_CHARS,...HSK5_CHARS,...HSK6_CHARS]);

const ALL_PINYIN = [
  "de","yī","shì","bù","le","rén","wǒ","zài","yǒu","tā",
  "zhè","wéi","zhī","dà","lái","yǐ","gè","zhōng","shàng","men",
  "dào","shuō","guó","hé","yě","zǐ","shí","chū","ér","yào",
  "yú","jiù","xià","kě","dōu","hǎo","méi","kàn","xué","guò",
  "fā","hòu","zuò","lǐ","yòng","suǒ","rán","jiā","zhǒng","chéng",
  "fāng","duō","jīng","me","qù","fǎ","rú","tóng","xiàn","dāng",
  "dòng","miàn","qǐ","dìng","tiān","fēn","hái","jìn","xiǎo","bù",
  "qí","xiē","zhǔ","yàng","xīn","běn","qián","kāi","dàn","yīn",
  "zhǐ","cóng","xiǎng","rì","jūn","zhě","yì","lì","yǔ","cháng",
  "bǎ","jī","mín","dì","gōng","cǐ","yǐ","shǐ","qíng","míng",
  "xìng","quán","sān","yòu","guān","diǎn","zhèng","yè","wài","jiāng",
  "liǎng","gāo","jiān","yóu","wèn","hěn","zuì","zhòng","bìng","wù",
  "shǒu","yīng","zhàn","xiàng","tóu","wén","tǐ","měi","xiāng",
  "jiàn","bèi","shén","èr","děng","chǎn","lùn","shū",
  "chǎng","jì","tè","nǚ","mǎ","nà","shuǐ","huó","jiě",
  "nèi","yuè","huí","pǐn","nián","xīn","shēng","dài","bǎi",
  "jiào","jīn","mén","gǔ","huǒ","wǎn","zǎo","bái","lǎo","tài",
  "shǎo","yuǎn","zǒu","chī","hē","shuì","mǎi","mài","tīng","xiě",
  "dú","wán","pǎo","fēi","xiào","kū","ài","hèn",
  "pà","wàng","zhǎo","ná","dǎ","gěi","sòng","gào","sù","bāng",
  "ràng","dá","jiǎng","chàng","huà","jiāo","liàn","yíng",
  "gē","jiě","mèi","bà","mā","yé","nǎi","ā","péng",
  "shī","yuán","guān","wáng","zhāng","liú","chén",
  "yáng","huáng","zhào","wú","zhōu","shān","hǎi","hú",
  "cūn","lù","jiē","fáng","lóu","diàn","guǎn","xiào",
  "yuàn","shěng","qū","xiàn","chūn","qiū","dōng","fēng",
  "xuě","yún","xīng","guāng","rè","lěng","nuǎn","liáng",
  "māo","gǒu","niǎo","hǔ","lóng","shé","niú","zhū",
  "huā","cǎo","gēn","guǒ","fàn","cài","ròu","dàn",
  "chá","jiǔ","tāng","táng","yán","chē","chuán","yín","háng",
  "bǐ","zì","yīn","wǔ","nǎo",
  "wǎng","luò","ruǎn","jiàn","xì","tǒng","jù","mǎ","hào",
  "tú","piàn","pín","sù","dù","liàng","jià","gé","zhì","néng",
  "lǜ","jiào","yōu","chā","cuò","duì","zhǔn",
  "què","zhēn","jiǎ","xū","kuài","màn","nán","jiǎn","dān",
  "fù","zá","qīng","chǔ","àn","shēn","qiǎn","kuān","zhǎi","hòu",
  "báo","yìng","yuán","zhí","wān","píng","xié","hóng",
  "lán","zǐ","hēi","huī","zōng","fěn",
];

// ─── Mistakes (localStorage) ──────────────────────────────────────────────────
const MISTAKES = new Set(JSON.parse(localStorage.getItem('pinyin_mistakes') || '[]'));
function saveMistakes() {
  localStorage.setItem('pinyin_mistakes', JSON.stringify([...MISTAKES]));
}

// ─── State ──────────────────────────────────────────────────────────────────
const S = {
  currentIndex: 0,
  options: [],
  selected: null,
  result: null,       // "correct" | "wrong"
  score: 0,
  streak: 0,
  maxStreak: 0,
  phase: "question",  // "question" | "feedback"
  shuffledChars: [],
  totalAnswered: 0,
  level: 'all',
  mode: 'quiz',
};

// ─── Helpers ─────────────────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function stripTones(s) {
  return s.replace(/[üǖǘǚǜ]/g, 'v')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase().trim();
}

function getCharPool() {
  if (S.level === 'all') return CHARACTERS;
  if (S.level === '7') return CHARACTERS.filter(c => !ALL_HSK_SET.has(c.char));
  if (S.level === 'mistakes') return CHARACTERS.filter(c => MISTAKES.has(c.char));
  const set = HSK_MAP[S.level];
  return CHARACTERS.filter(c => set.has(c.char));
}

function startLevel(level) {
  const prevLevel = S.level;
  S.level = level;
  const pool = getCharPool();
  if (pool.length === 0) { S.level = prevLevel; return; }
  S.currentIndex  = 0;
  S.score         = 0;
  S.streak        = 0;
  S.maxStreak     = 0;
  S.totalAnswered = 0;
  S.shuffledChars = shuffle(pool);
  generateOptions(0);
  render();
  document.querySelectorAll('.level-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.level === level)
  );
}

function switchMode(mode) {
  S.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode)
  );
  generateOptions(S.currentIndex);
  render();
}

function getWrongOptions(correct, count = 3) {
  const pool = ALL_PINYIN.filter(p => p !== correct);
  return shuffle(pool).slice(0, count);
}

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = "zh-CN";
  u.rate  = 0.85;
  window.speechSynthesis.speak(u);
}

// ─── DOM refs ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const elCard      = $("char-card");
const elGlyph     = $("char-glyph");
const elMain      = $("char-main");
const elTrad      = $("char-trad");
const elReveal    = $("char-reveal");
const elPinyin    = $("char-pinyin");
const elMeaning   = $("char-meaning");
const elSparkle   = $("sparkle");
const elHint      = $("hint-text");
const elOptions   = $("options");
const elActionRow = $("action-row");
const elScore     = $("stat-score");
const elAcc       = $("stat-acc");
const elProg      = $("stat-prog");
const elBar       = $("progress-bar");
const elStreak    = $("streak-badge");
const elMaxBadge  = $("max-streak-badge");
const elMaxVal    = $("max-streak-val");
const elInputArea = $("input-area");
const elPinyinInp = $("pinyin-input");
const elSubmitBtn = $("submit-btn");

// ─── Render ───────────────────────────────────────────────────────────────────
function updateStats() {
  const accuracy = S.totalAnswered > 0 ? Math.round((S.score / S.totalAnswered) * 100) : 0;
  elScore.textContent  = S.score;
  elAcc.textContent    = accuracy + "%";
  elProg.textContent   = `${S.currentIndex}/${S.shuffledChars.length}`;
  elBar.style.width    = `${(S.currentIndex / S.shuffledChars.length) * 100}%`;
  elStreak.textContent = `🔥 ${S.streak} streak`;
  if (S.maxStreak >= 5) {
    elMaxBadge.style.display = "block";
    elMaxVal.textContent = S.maxStreak;
  }
  const elMistakesBtn = $('mistakes-btn');
  if (elMistakesBtn) {
    elMistakesBtn.textContent = `Đã sai (${MISTAKES.size})`;
    elMistakesBtn.disabled = MISTAKES.size === 0;
  }
}

function renderCard() {
  const cur = S.shuffledChars[S.currentIndex];
  if (!cur) return;
  elMain.textContent = cur.char;
  const tradRaw = cur.traditional;
  if (tradRaw) {
    const tradChar = [...tradRaw].join("／"); // first char (handles multi-char strings like "發髮")
    if (tradChar && tradChar !== cur.char) {
      elTrad.textContent = tradChar;
      elTrad.style.display = "inline";
    } else {
      elTrad.style.display = "none";
    }
  } else {
    elTrad.style.display = "none";
  }

  elCard.className = "char-card " + (S.result === "correct" ? "correct" : S.result === "wrong" ? "wrong" : "neutral");

  if (S.result === "correct" || (S.mode === 'input' && S.result === 'wrong')) {
    elPinyin.textContent  = Array.isArray(cur.pinyin) ? cur.pinyin.join(' / ') : cur.pinyin;
    elMeaning.textContent = cur.definition || cur.meaning || '';
    elReveal.style.display = "block";
    if (S.result === 'correct') {
      elSparkle.style.display = "block";
      elSparkle.style.animation = "none";
      void elSparkle.offsetWidth; // reflow to restart animation
      elSparkle.style.animation = "pop 0.5s ease forwards";
    } else {
      elSparkle.style.display = "none";
    }
  } else {
    elReveal.style.display  = "none";
    elSparkle.style.display = "none";
  }
}

function renderOptions() {
  if (S.mode === 'input') { elOptions.style.display = 'none'; return; }
  elOptions.style.display = '';
  const cur = S.shuffledChars[S.currentIndex];
  if (!cur) return;
  elOptions.innerHTML = "";
  S.options.forEach(opt => {
    const isCorrect  = opt === cur.pinyin[0];
    const isSelected = opt === S.selected;
    const revealed   = S.phase === "feedback";

    const btn = document.createElement("button");
    btn.className = "option-btn " + (
      !revealed ? "neutral" :
      isCorrect ? "correct" :
      isSelected ? "wrong-selected" : "neutral"
    );
    btn.disabled = revealed;

    let label = opt;
    if (revealed && isCorrect)              label = "✓ " + opt;
    else if (revealed && isSelected)        label = "✗ " + opt;
    btn.textContent = label;

    btn.addEventListener("click", () => handleSelect(opt));
    elOptions.appendChild(btn);
  });
}

function renderInputArea() {
  if (S.mode !== 'input') { elInputArea.style.display = 'none'; return; }
  elInputArea.style.display = 'block';
  if (S.phase === 'question') {
    elPinyinInp.value = '';
    elPinyinInp.className = 'pinyin-input';
    elPinyinInp.disabled = false;
    elSubmitBtn.disabled = false;
    setTimeout(() => elPinyinInp.focus(), 50);
  } else {
    elPinyinInp.className = 'pinyin-input ' + (S.result || '');
    elPinyinInp.disabled = true;
    elSubmitBtn.disabled = true;
  }
}

function renderActions() {
  if (S.phase === "feedback" && S.result === "wrong") {
    elActionRow.style.display = "flex";
  } else {
    elActionRow.style.display = "none";
  }
  if (S.phase === "question") {
    elHint.textContent = S.mode === 'input'
      ? 'Nhập pinyin rồi nhấn Enter · Nhấn chữ để nghe'
      : 'Chọn phiên âm đúng · Nhấn chữ để nghe';
    elHint.style.display = "block";
  } else {
    elHint.style.display = "none";
  }
}

function render() {
  updateStats();
  renderCard();
  renderOptions();
  renderInputArea();
  renderActions();
}

// ─── Logic ────────────────────────────────────────────────────────────────────
function generateOptions(idx) {
  const correct = S.shuffledChars[idx]?.pinyin[0];
  if (!correct) return;
  S.options  = shuffle([correct, ...getWrongOptions(correct)]);
  S.selected = null;
  S.result   = null;
  S.phase    = "question";
}

function resolveAnswer(isCorrect, delay) {
  const cur = S.shuffledChars[S.currentIndex];
  S.phase = 'feedback';
  S.totalAnswered++;
  speak(cur.char);
  if (isCorrect) {
    S.result = 'correct';
    S.score++;
    S.streak++;
    if (S.streak > S.maxStreak) S.maxStreak = S.streak;
    if (S.level !== 'mistakes') { MISTAKES.delete(cur.char); saveMistakes(); }
    render();
    setTimeout(nextCard, delay);
  } else {
    S.result = 'wrong';
    S.streak = 0;
    if (S.level !== 'mistakes') { MISTAKES.add(cur.char); saveMistakes(); }
    render();
  }
}

function handleSelect(opt) {
  if (S.phase !== 'question') return;
  S.selected = opt;
  resolveAnswer(opt === S.shuffledChars[S.currentIndex]?.pinyin[0], 900);
}

function nextCard() {
  S.currentIndex = (S.currentIndex + 1) % S.shuffledChars.length;
  generateOptions(S.currentIndex);
  render();
}

function handleInputSubmit() {
  if (S.phase !== 'question') return;
  const val = elPinyinInp.value.trim();
  if (!val) { elPinyinInp.focus(); return; }
  const correct = S.shuffledChars[S.currentIndex]?.pinyin[0];
  resolveAnswer(stripTones(val) === stripTones(correct), 1200);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  S.shuffledChars = shuffle(getCharPool());
  generateOptions(0);

  elCard.addEventListener("click", () => {
    const cur = S.shuffledChars[S.currentIndex];
    if (cur) speak(cur.char);
  });

  $("next-btn").addEventListener("click", nextCard);

  document.querySelectorAll('.level-btn').forEach(btn =>
    btn.addEventListener('click', () => startLevel(btn.dataset.level))
  );

  document.querySelectorAll('.mode-btn').forEach(btn =>
    btn.addEventListener('click', () => switchMode(btn.dataset.mode))
  );

  elSubmitBtn.addEventListener('click', handleInputSubmit);
  elPinyinInp.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleInputSubmit();
  });

  render();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(console.error);
    });
  }
</script>
</body>
</html>
